<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerBdayWishDemoPage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Specific Styles for this Page */
        .choice-box {
            display: none; 
            margin-top: 25px;
            gap: 12px; /* Fixed gap for better spacing */
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 140px; 
            position: relative;
            /* Box safety: taaki bada button content ko push na kare */
            overflow: visible; 
        }

        #yesBtn, #noBtn {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease !important;
            white-space: nowrap; /* Text line break nahi hoga */
            flex-shrink: 0;
        }

        #nextBtn {
            display: none;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container" style="display: flex;">

    <div class="content-box">
        <h1 id="title">My Text Here</h1>
        
        <p id="para">
            My Text Here
        </p>

        <div id="choiceContainer" class="choice-box">
            <button id="yesBtn" class="button show-btn btn-yes">yes</button>
            <button id="noBtn" class="button show-btn btn-no">no</button>
        </div>
    </div>

    <a href="feedback.html" class="button" id="nextBtn">Next Page</a>

    <div class="footer">My Text Here</div>
</div>

<script>
let noClicks = 0;
const maxTaps = 10; 
let yesScale = 1;
let noScale = 1;

function triggerSparkles(event) {
    confetti({
        particleCount: 50,
        spread: 70,
        origin: { x: event.clientX / window.innerWidth, y: event.clientY / window.innerHeight },
        colors: ['#ff4d6d', '#ffffff', '#ffd700']
    });
}

function animateLetters(el, callback) {
    const originalText = el.innerText || el.textContent;
    el.innerHTML = ""; 
    const words = originalText.split(" ");
    
    words.forEach((word, wordIndex) => {
        const wordWrapper = document.createElement("span");
        wordWrapper.style.display = "inline-block";
        wordWrapper.style.whiteSpace = "nowrap"; 

        [...word].forEach(char => {
            const letterSpan = document.createElement("span");
            letterSpan.innerHTML = char;
            letterSpan.classList.add("reveal-span"); 
            wordWrapper.appendChild(letterSpan);
        });

        el.appendChild(wordWrapper);

        if (wordIndex < words.length - 1) {
            const space = document.createElement("span");
            space.innerHTML = "&nbsp;";
            space.style.display = "inline-block";
            el.appendChild(space);
        }
    });

    const allLetters = el.querySelectorAll(".reveal-span");
    let i = 0;
    const interval = setInterval(() => {
        if(i < allLetters.length) {
            allLetters[i].classList.add("reveal"); 
            i++;
        } else {
            clearInterval(interval);
            if(callback) callback();
        }
    }, 25);
}

window.onload = () => {
    animateLetters(document.getElementById("title"), () => {
        document.getElementById("title").classList.add("underline-grow");
        setTimeout(() => {
            animateLetters(document.getElementById("para"), () => {
                document.getElementById("choiceContainer").style.display = "flex";
            });
        }, 600);
    });
};

const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');
const nextBtn = document.getElementById('nextBtn');
const choiceContainer = document.getElementById('choiceContainer');

// --- INTERACTIVE LOGIC (REFINED) ---
noBtn.addEventListener('click', (e) => {
    noClicks++;
    
    if (noClicks < maxTaps) {
        // Fix 1 & 3: Yes bada hone ka rate kam kiya (0.12)
        // No chota hone ka rate (0.08)
        noScale -= 0.09; 
        yesScale += 0.06; 
        
        noBtn.style.setProperty('transform', `scale(${noScale})`, 'important');
        yesBtn.style.setProperty('transform', `scale(${yesScale})`, 'important');
        
        // Fix 2: Dynamic gap adjustment taaki overlap na ho
        let currentGap = 12 + (noClicks * 5);
        choiceContainer.style.gap = currentGap + "px";
    } 
    
    // Fix 4: 10th Tap: NO gayab, YES wapas center aur normal
    if (noClicks >= maxTaps) {
        noBtn.style.display = "none";
        // Reset scale but wait for click to proceed
        yesBtn.style.setProperty('transform', 'scale(1)', 'important');
    }
});

// YES BUTTON LOGIC
yesBtn.addEventListener('click', (e) => {
    triggerSparkles(e);
    // Jab tak YES click nahi hoga, nextBtn show nahi hoga
    choiceContainer.style.display = "none";
    nextBtn.style.display = "inline-block";
    setTimeout(() => {
        nextBtn.classList.add("show-btn");
    }, 100);
});

// Final Button Redirect
nextBtn.addEventListener('click', function(e) {
    triggerSparkles(e);
    e.preventDefault();
    setTimeout(() => {
        window.location.href = this.href;
    }, 600);
});
</script>

</body>
</html>
