<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerBdayWishDemoPage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="container" style="display: flex;"> 
        <div class="content-box">
            <h1 id="title">My Text Here</h1>
            
            <p id="para">My Text Here
            </p>
        </div>

        <a href="confession.html" class="button" id="nextBtn">Next Page</a>

        <div class="footer">My Text Here</div>
    </div>

<script>
// Sparkles Function
function triggerSparkles(event) {
    confetti({ 
        particleCount: 50, 
        spread: 70, 
        origin: { x: event.clientX / window.innerWidth, y: event.clientY / window.innerHeight }, 
        colors: ['#ff4d6d', '#ffffff', '#ffd700'] 
    });
}

// Word-Safe Letter Animation
function animateLetters(el, callback) {
    const originalText = el.innerText || el.textContent;
    el.innerHTML = ""; 

    const words = originalText.split(" ");
    
    words.forEach((word, wordIndex) => {
        // Protect words from breaking
        const wordWrapper = document.createElement("span");
        wordWrapper.style.display = "inline-block"; 
        wordWrapper.style.whiteSpace = "nowrap"; 

        [...word].forEach(char => {
            const letterSpan = document.createElement("span");
            letterSpan.innerHTML = char;
            // Matches .reveal-span in CSS
            letterSpan.classList.add("reveal-span"); 
            wordWrapper.appendChild(letterSpan);
        });

        el.appendChild(wordWrapper);

        if (wordIndex < words.length - 1) {
            const space = document.createElement("span");
            space.innerHTML = "&nbsp;";
            space.style.display = "inline-block";
            el.appendChild(space);
        }
    });

    const allLetters = el.querySelectorAll(".reveal-span");
    let i = 0;
    const interval = setInterval(() => {
        if(i < allLetters.length) {
            allLetters[i].classList.add("reveal"); // Triggers CSS transition
            i++;
        } else {
            clearInterval(interval);
            if(callback) callback();
        }
    }, 25); 
}

// Sequence trigger
window.onload = () => {
    const t = document.getElementById("title");
    const p = document.getElementById("para");
    const b = document.getElementById("nextBtn");

    animateLetters(t, () => {
        t.classList.add("underline-grow");
        setTimeout(() => {
            animateLetters(p, () => {
                b.classList.add("show-btn");
            });
        }, 600);
    });
};

// Button logic
document.getElementById('nextBtn').addEventListener('click', function(e) {
    triggerSparkles(e);
    e.preventDefault();
    setTimeout(() => { window.location.href = this.href; }, 600);
});
</script>
</body>
</html>
